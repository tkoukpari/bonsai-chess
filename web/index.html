<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/daily/">
  <title>BonsaiChess - Daily Puzzle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    body { padding-top: 1.5rem; padding-bottom: 2rem; }
    #board-col { max-width: 450px; }
    .move-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .move-num { min-width: 1.8rem; text-align: right; color: var(--bs-secondary); font-weight: 500; }
    .move-input { flex: 1; max-width: 6rem; }
    .feedback-correct { color: var(--bs-success); font-weight: 600; }
    .feedback-error { color: var(--bs-danger); font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="text-center py-5 text-secondary" style="display: none;">
      <div class="spinner-border spinner-border-sm me-2" role="status"></div>
      Loading puzzle&hellip;
    </div>
    <div id="error" class="text-center py-5" style="display: none;">
      <p id="error-text" class="text-danger"></p>
      <button type="button" class="btn btn-outline-primary" id="retry-btn">Retry</button>
    </div>

    <div id="puzzle-area" style="display: none;">
      <div class="row gx-4 gy-3">
        <div class="col-md-6" id="board-col">
          <div id="board" style="width: 100%;"></div>
        </div>
        <div class="col-md-6 d-flex flex-column">
          <p id="to-play" class="text-secondary small mb-2"></p>
          <div id="move-rows" class="mb-3"></div>
          <div class="mb-2">
            <button type="button" class="btn btn-primary" id="check-btn">Check answer</button>
          </div>
          <p id="feedback" class="mb-0"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
