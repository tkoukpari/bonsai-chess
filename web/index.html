<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/daily/">
  <title>BonsaiChess</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --light-square: #f0ecd6;
      --dark-square: #668b43;
      --board-border: #403838;
    }
    body { padding-top: 1rem; padding-bottom: 2rem; }
    .board-wrap {
      position: relative;
      max-width: 400px;
      margin: 0 auto 1.5rem;
    }
    .chess-board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      aspect-ratio: 1;
      border: 2px solid var(--board-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .chess-board.transition-out { opacity: 0; transition: opacity 0.4s ease-in-out; }
    .chess-board.transition-in { opacity: 1; transition: opacity 0.4s ease-in-out; }
    .square {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      position: relative;
    }
    .square.light { background-color: var(--light-square); }
    .square.dark { background-color: var(--dark-square); }
    .piece-floater {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: inherit;
      pointer-events: none;
      z-index: 10;
      transition: none;
    }
    .piece-floater.animating {
      transition: left 0.55s ease-in-out, top 0.55s ease-in-out;
    }
    .move-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .move-num { width: 1.5rem; text-align: right; color: var(--bs-secondary); }
    .move-input { flex: 1; max-width: 6rem; }
    .feedback-correct { color: var(--bs-success); }
    .feedback-error { color: var(--bs-danger); }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="text-center py-4 text-secondary" style="display: none;">
      Loading puzzle…
    </div>
    <div id="error" class="text-center py-4" style="display: none;">
      <p id="error-text" class="text-danger"></p>
      <button type="button" class="btn btn-outline-primary" id="retry-btn">Retry</button>
    </div>

    <div id="puzzle-area" style="display: none;">
      <div class="board-wrap">
        <div id="board" class="chess-board">
          <div id="piece-floater" class="piece-floater" style="display: none;"></div>
        </div>
      </div>

      <p id="to-play" class="text-secondary small mb-2"></p>

      <div id="move-rows" class="mb-3"></div>

      <div class="d-flex justify-content-center gap-2 flex-wrap mb-2">
        <button type="button" class="btn btn-primary" id="check-btn">Check answer</button>
      </div>
      <p id="feedback" class="text-center mb-0"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
